name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: '6.x'

      - name: Use GitVersion
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2

      - name: Update version in pubspec.yaml
        run: |
          sed -i "s/version: .*/version: ${{ steps.gitversion.outputs.MajorMinorPatch }}+${{ github.run_number }}/g" pubspec.yaml

      - name: Download Android keystore
        id: android_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: android-upload-keystore.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}
          fileDir: ./android/app

      - name: Create key.properties
        run: |
          echo "storeFile=android-upload-keystore.jks" > android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.35.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file
        run: |
          echo "PDF_ENCRYPTION_KEY=${{ secrets.PDF_ENCRYPTION_KEY }}" > .env
          echo "PDF_LINK_BASE=https://spiewnikpielgrzyma.norbertchmiel.pl/note_files/" >> .env

      - name: Build Android appbundle
        run: flutter build appbundle --obfuscate --split-debug-info=build/

      - name: Upload to Google Play internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: pl.norbertchmiel.spiewnik_pielgrzyma
          track: internal
          status: completed
          releaseFiles: build/app/outputs/bundle/release/app-release.aab

      - name: Build web
        run: flutter build web --release

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.WEB_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy web
        run: scp -i ~/.ssh/deploy_key -r build/web/* ${{ secrets.WEB_HOST_USER }}@${{ secrets.WEB_HOST }}:${{ secrets.WEB_HOST_PATH }}

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline "$PREV_TAG"..HEAD~1)
          else
            NOTES=$(git log --oneline HEAD~20..HEAD~1)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Changes
            ${{ steps.notes.outputs.NOTES }}
          generate_release_notes: false
